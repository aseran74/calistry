name: calistenia_app
description: App de calistenia con ejercicios, rutinas y progreso.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  chewie: ^1.7.4
  video_player: ^2.8.2
  shimmer: ^3.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.3
  flutter_web_auth_2: ^4.1.0
  file_picker: ^10.3.10
  google_fonts: ^8.0.2
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - logo/
    - logo/Calistry.logo.jpg
    - logo/google_play_badge.png
    - logo/Logo4.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/calistry_logo_mark.png
  min_sdk_android: 21
