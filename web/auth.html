<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Calistry Auth</title>
</head>
<body>
  <script>
    if (window.opener) {
      window.opener.postMessage({
        'flutter-web-auth-2': window.location.href
      }, window.location.origin);
      window.close();
    } else {
      window.location.replace('/#' + window.location.href);
    }
  </script>
</body>
</html>
